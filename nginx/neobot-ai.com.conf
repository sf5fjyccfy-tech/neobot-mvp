# =============================================================================
# NéoBot — Configuration Nginx Production
# api.neobot-ai.com → backend FastAPI (port 8000)
# =============================================================================

# Redirection HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.neobot-ai.com;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Backend API
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.neobot-ai.com;

    # SSL — Let's Encrypt via Certbot
    ssl_certificate     /etc/letsencrypt/live/api.neobot-ai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.neobot-ai.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Sécurité headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Taille max upload (PDF knowledge base)
    client_max_body_size 20M;

    # Logs
    access_log /var/log/nginx/neobot-api-access.log;
    error_log  /var/log/nginx/neobot-api-error.log;

    # Proxy vers le backend FastAPI
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts généreux pour les appels IA (DeepSeek peut prendre 20-30s)
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffers
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 8k;
    }

    # Health check — pas de log pour éviter le bruit
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }
}
