version: '3.8'

services:
  # ========== ORACLE DATABASE (OCI) ==========
  # Note: This is a reference. In production, use OCI Autonomous Database
  # Connection string configured in .env.oracle
  
  # ========== REDIS CACHE ==========
  redis:
    image: redis:7-alpine
    container_name: neobot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_pass}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - REDIS_REPLICATION_MODE=master
    networks:
      - neobot-network
    restart: unless-stopped

  # ========== BACKEND (UPDATED) ==========
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      args:
        - PYTHON_VERSION=3.11
    container_name: neobot-backend
    ports:
      - "8000:8000"
    environment:
      # Oracle Configuration
      - ORACLE_HOST=${ORACLE_HOST}
      - ORACLE_PORT=${ORACLE_PORT:-1521}
      - ORACLE_USER=${ORACLE_USER}
      - ORACLE_PASSWORD=${ORACLE_PASSWORD}
      - ORACLE_SERVICE=${ORACLE_SERVICE}
      
      # Redis Configuration
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=0
      
      # Backend Configuration
      - BACKEND_ENV=production
      - BACKEND_DEBUG=false
      - BACKEND_WORKERS=4
      - LOG_LEVEL=INFO
      
      # API Configuration
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - WHATSAPP_WEBHOOK_SECRET=${WHATSAPP_WEBHOOK_SECRET}
    
    depends_on:
      redis:
        condition: service_healthy
    
    volumes:
      - ./backend:/app/backend
      - logs:/var/log/neobot
    
    networks:
      - neobot-network
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========== WHATSAPP SERVICE ==========
  whatsapp-service:
    build:
      context: ./whatsapp-service
      dockerfile: Dockerfile
    container_name: neobot-whatsapp
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:8000
      - WEBHOOK_URL=${WHATSAPP_WEBHOOK_URL}
      - WEBHOOK_SECRET=${WHATSAPP_WEBHOOK_SECRET}
    
    depends_on:
      - backend
    
    volumes:
      - ./whatsapp-service:/app
      - whatsapp_auth:/app/auth_info_baileys
    
    networks:
      - neobot-network
    
    restart: unless-stopped

  # ========== FRONTEND ==========
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: neobot-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=https://api.neobot.example.com
      - REACT_APP_WHATSAPP_URL=https://whatsapp.neobot.example.com
    
    depends_on:
      - backend
    
    networks:
      - neobot-network
    
    restart: unless-stopped

  # ========== NGINX REVERSE PROXY ==========
  nginx:
    image: nginx:latest
    container_name: neobot-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    
    depends_on:
      - backend
      - frontend
      - whatsapp-service
    
    networks:
      - neobot-network
    
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  whatsapp_auth:
    driver: local
  logs:
    driver: local

networks:
  neobot-network:
    driver: bridge

# ========== PRODUCTION NOTES ==========
# 1. Oracle Database: Use AWS RDS Oracle or OCI Autonomous Database
#    No need to run Oracle in Docker - use managed service
# 2. Redis: Can run in Docker or use AWS ElastiCache / OCI Cache
# 3. Secrets: Use AWS Secrets Manager or OCI Vault
# 4. SSL/TLS: Configure in nginx and environment variables
# 5. Monitoring: Enable CloudWatch / OCI Monitoring
