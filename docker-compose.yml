# =========================================================================
# NeoBot — Docker Compose for Hetzner VPS
#
# Architecture :
#   - backend (FastAPI)      → port 8000 exposé (Cloudflare proxy → HTTPS)
#   - whatsapp (Baileys)     → port 3001 INTERNE SEULEMENT
#   - DB                     → Neon.tech externe (DATABASE_URL dans .env)
#   - Frontend               → Cloudflare Pages (non déployé ici)
#
# Avant de lancer : cp .env.example .env && nano .env
# =========================================================================

version: '3.8'

services:

  # ========== BACKEND (FastAPI) ==========
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: neobot_backend
    env_file: .env
    environment:
      # Overrides pour s'assurer que le service WhatsApp est adressé en interne
      WHATSAPP_SERVICE_URL: "http://whatsapp:3001"
    ports:
      - "8000:8000"
    volumes:
      - ./logs/backend:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - neobot_network
    restart: unless-stopped

  # ========== WHATSAPP SERVICE (Node.js / Baileys) ==========
  whatsapp:
    build:
      context: ./whatsapp-service
      dockerfile: Dockerfile.prod
    container_name: neobot_whatsapp
    env_file: .env
    environment:
      # Overrides pour s'assurer que le backend est adressé en interne
      WHATSAPP_BACKEND_URL: "http://backend:8000"
      WHATSAPP_PORT: "3001"
    # Port 3001 NON exposé vers l'extérieur — communication interne Docker uniquement.
    # Le backend proxifie les appels WhatsApp depuis le frontend.
    expose:
      - "3001"
    volumes:
      - ./auth_info_baileys:/app/auth_info_baileys
      - ./logs/whatsapp:/app/logs
    depends_on:
      - backend
    networks:
      - neobot_network
    restart: unless-stopped

  # ========== FRONTEND (Next.js standalone) ==========
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: neobot_frontend
    environment:
      NEXT_PUBLIC_API_URL: "https://api.neobot-ai.com"
      PORT: "3002"
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - neobot_network
    restart: unless-stopped

networks:
  neobot_network:
    driver: bridge

volumes: {}

