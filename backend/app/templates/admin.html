<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NéoBot - Dashboard Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen">
        <!-- Header -->
        <header class="bg-white shadow">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <h1 class="text-2xl font-bold text-gray-900">🚀 NéoBot Admin</h1>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span class="text-gray-700">Super Admin</span>
                        <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white">
                            A
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
            <!-- Stats Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <div class="bg-white overflow-hidden shadow rounded-lg">
                    <div class="p-5">
                        <div class="flex items-center">
                            <div class="flex-shrink-0">
                                <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white">
                                    👥
                                </div>
                            </div>
                            <div class="ml-5 w-0 flex-1">
                                <dl>
                                    <dt class="text-sm font-medium text-gray-500 truncate">Clients Totaux</dt>
                                    <dd class="text-lg font-medium text-gray-900" id="total-clients">0</dd>
                                </dl>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white overflow-hidden shadow rounded-lg">
                    <div class="p-5">
                        <div class="flex items-center">
                            <div class="flex-shrink-0">
                                <div class="w-8 h-8 bg-green-500 rounded-full flex items-center justify-center text-white">
                                    💬
                                </div>
                            </div>
                            <div class="ml-5 w-0 flex-1">
                                <dl>
                                    <dt class="text-sm font-medium text-gray-500 truncate">Conversations Actives</dt>
                                    <dd class="text-lg font-medium text-gray-900" id="active-conversations">0</dd>
                                </dl>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white overflow-hidden shadow rounded-lg">
                    <div class="p-5">
                        <div class="flex items-center">
                            <div class="flex-shrink-0">
                                <div class="w-8 h-8 bg-purple-500 rounded-full flex items-center justify-center text-white">
                                    💰
                                </div>
                            </div>
                            <div class="ml-5 w-0 flex-1">
                                <dl>
                                    <dt class="text-sm font-medium text-gray-500 truncate">Revenue Mensuel</dt>
                                    <dd class="text-lg font-medium text-gray-900" id="monthly-revenue">0 FCFA</dd>
                                </dl>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white overflow-hidden shadow rounded-lg">
                    <div class="p-5">
                        <div class="flex items-center">
                            <div class="flex-shrink-0">
                                <div class="w-8 h-8 bg-orange-500 rounded-full flex items-center justify-center text-white">
                                    📈
                                </div>
                            </div>
                            <div class="ml-5 w-0 flex-1">
                                <dl>
                                    <dt class="text-sm font-medium text-gray-500 truncate">Taux de Conversion</dt>
                                    <dd class="text-lg font-medium text-gray-900" id="conversion-rate">0%</dd>
                                </dl>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Charts and Tables -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Analytics Chart -->
                <div class="bg-white shadow rounded-lg p-6">
                    <h2 class="text-lg font-medium text-gray-900 mb-4">Activité Récente</h2>
                    <div class="h-64">
                        <canvas id="analyticsChart"></canvas>
                    </div>
                </div>

                <!-- Recent Conversations -->
                <div class="bg-white shadow rounded-lg p-6">
                    <h2 class="text-lg font-medium text-gray-900 mb-4">Conversations Récentes</h2>
                    <div class="overflow-y-auto max-h-64">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Client</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Dernier Message</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Statut</th>
                                </tr>
                            </thead>
                            <tbody id="conversations-list" class="bg-white divide-y divide-gray-200">
                                <!-- Les conversations seront chargées ici -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Client Performance -->
            <div class="mt-6 bg-white shadow rounded-lg p-6">
                <h2 class="text-lg font-medium text-gray-900 mb-4">Performance des Clients</h2>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Business</th>
                                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Secteur</th>
                                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Plan</th>
                                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Conversations</th>
                                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Taux Conversion</th>
                            </tr>
                        </thead>
                        <tbody id="clients-performance" class="bg-white divide-y divide-gray-200">
                            <!-- Les performances seront chargées ici -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Charger les données au démarrage
        async function loadDashboardData() {
            try {
                // Vue d'ensemble
                const overviewResponse = await fetch('/api/admin/overview');
                const overviewData = await overviewResponse.json();
                
                if (overviewData.status === 'success') {
                    const data = overviewData.data;
                    document.getElementById('total-clients').textContent = data.total_clients;
                    document.getElementById('active-conversations').textContent = data.active_conversations;
                    document.getElementById('monthly-revenue').textContent = data.monthly_revenue.toLocaleString() + ' FCFA';
                    document.getElementById('conversion-rate').textContent = data.conversion_rate + '%';
                }

                // Conversations récentes
                const convResponse = await fetch('/api/admin/recent-conversations');
                const convData = await convResponse.json();
                
                if (convData.status === 'success') {
                    const convList = document.getElementById('conversations-list');
                    convList.innerHTML = convData.data.map(conv => `
                        <tr>
                            <td class="px-4 py-2 text-sm text-gray-900">${conv.client_business}</td>
                            <td class="px-4 py-2 text-sm text-gray-500">${conv.last_message || 'Aucun message'}</td>
                            <td class="px-4 py-2">
                                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full 
                                    ${conv.status === 'active' ? 'bg-green-100 text-green-800' : 
                                      conv.status === 'converted' ? 'bg-blue-100 text-blue-800' : 
                                      'bg-gray-100 text-gray-800'}">
                                    ${conv.status}
                                </span>
                            </td>
                        </tr>
                    `).join('');
                }

                // Performance clients
                const perfResponse = await fetch('/api/admin/client-performance');
                const perfData = await perfResponse.json();
                
                if (perfData.status === 'success') {
                    const perfList = document.getElementById('clients-performance');
                    perfList.innerHTML = perfData.data.map(client => `
                        <tr>
                            <td class="px-4 py-2 text-sm font-medium text-gray-900">${client.business_name}</td>
                            <td class="px-4 py-2 text-sm text-gray-500">${client.sector}</td>
                            <td class="px-4 py-2 text-sm text-gray-500">${client.plan}</td>
                            <td class="px-4 py-2 text-sm text-gray-900">${client.conversation_count}</td>
                            <td class="px-4 py-2 text-sm text-gray-900">${client.conversion_rate}%</td>
                        </tr>
                    `).join('');
                }

            } catch (error) {
                console.error('Erreur chargement dashboard:', error);
            }
        }

        // Charger au démarrage
        document.addEventListener('DOMContentLoaded', loadDashboardData);

        // Recharger toutes les 30 secondes
        setInterval(loadDashboardData, 30000);
    </script>
</body>
</html>
